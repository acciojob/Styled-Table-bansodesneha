 <!DOCTYPE html>
<html>
<head>
    <title>Styled Table</title>
    <style>
        table {
            width: 70%;
            margin: 20px auto;
            border-collapse: collapse;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        thead {
            background-color: #4CAF50;
            color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tbody tr:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Math</th>
                <th>Science</th>
                <th>English</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Sneha</td>
                <td>88</td>
                <td>92</td>
                <td>85</td>
                <td>265</td>
            </tr>
            <tr>
                <td>Riya</td>
                <td>76</td>
                <td>81</td>
                <td>79</td>
                <td>236</td>
            </tr>
            <tr>
                <td>Aman</td>
                <td>90</td>
                <td>87</td>
                <td>91</td>
                <td>268</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
